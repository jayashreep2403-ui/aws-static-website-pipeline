<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DevOps Portfolio Pipeline</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; color: #333; text-align: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; max-width: 500px; }
        h1 { color: #232f3e; }
        .status { color: #2ec4b6; font-weight: bold; }

</head>
<body>
    <div class="card">
        <h1>🚀 Pipeline Deployment Successful!</h1>
